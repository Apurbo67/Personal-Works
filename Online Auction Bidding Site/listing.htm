<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ShopOnline Listing</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{--fg:#1f2937;--muted:#6b7280;--brand:#0b5ed7;--border:#e5e7eb;--panel:#f8fafc;--white:#fff;}
  *{box-sizing:border-box}
  body{font-family:Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f3f4f6;color:var(--fg)}
  .header{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;text-align:center}
  .title{font-weight:700;font-size:22px;margin:6px 0}
  .nav{display:flex;gap:10px;justify-content:center;margin:8px 0 4px}
  .btn{appearance:none;border:1px solid var(--border);background:var(--white);padding:8px 14px;border-radius:8px;cursor:pointer}
  .btn:hover{background:#f5f5f5}
  .btn.active{box-shadow:0 0 0 2px #e0e7ff inset;background:#eef2ff}
  .wrap{max-width:980px;margin:22px auto;padding:0 18px}
  .panel{border:1px solid var(--border);background:var(--white);border-radius:10px;overflow:hidden}
  .panelTitle{background:#f9fafb;border-bottom:1px solid var(--border);padding:10px 14px;text-align:center;color:var(--muted)}
  .panelBody{padding:16px 18px 22px}
  .note{color:var(--muted);font-size:13px;margin-bottom:8px}
  .req{color:#c2410c;font-weight:600}
  .row{display:grid;grid-template-columns:180px 1fr 120px;gap:10px;align-items:center;margin:10px 0}
  .row label{justify-self:end}
  .row .full{grid-column:2 / span 2}
  input[type=text], select, textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--white)}
  textarea{min-height:110px;resize:vertical}
  .tiny{max-width:90px}
  .actions{display:flex;gap:10px;margin-top:12px}
  .primary{border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:8px;padding:8px 14px}
  .primary:hover{filter:brightness(0.98)}
  .muted{color:var(--muted)}
  #msg{margin-top:12px}
  .ok{color:#0a7a0a} .err{color:#b00020}
</style>
</head>
<body>
<header class="header">
  <div class="title">ShopOnline</div>
  <div class="nav">
    <button class="btn" onclick="location.href='home.htm'">Home</button>
    <button class="btn active" onclick="location.href='listing.htm'">Listing</button>
    <button class="btn" onclick="location.href='bidding.php'">Bidding</button>
    <button class="btn" onclick="location.href='maintenance.htm'">Maintenance</button>
    <button class="btn" onclick="location.href='logout.php'">Log Out</button>
  </div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="panelTitle">To create a listing, enter listing details below.</div>
    <div class="panelBody">
      <div class="note"><span class="req">*</span> Required Fields</div>

      <div class="row">
        <label for="title"><span class="req">*</span> Item Name</label>
        <input id="title" type="text" placeholder="e.g. Canon EOS R50 (Black) 18-45mm" />
        <div></div>
      </div>

      <div class="row">
        <label for="cat"><span class="req">*</span> Category</label>
        <div>
          <select id="cat"></select>
          <div id="otherWrap" style="display:none; margin-top:6px;">
            <input id="otherCat" type="text" placeholder="Enter new category" />
          </div>
        </div>
        <div></div>
      </div>

      <div class="row">
        <label for="desc">Description</label>
        <textarea id="desc" class="full" placeholder="Condition, accessories, warranty, etc."></textarea>
      </div>

      <div class="row">
        <label for="start"><span class="req">*</span> Start Price</label>
        <div><input id="start" type="text" class="tiny" placeholder="00.00" /></div>
        <div class="muted">$</div>
      </div>

      <div class="row">
        <label for="reserve"><span class="req">*</span> Reserve Price</label>
        <div><input id="reserve" type="text" class="tiny" placeholder="00.00" /></div>
        <div class="muted">$</div>
      </div>

      <div class="row">
        <label for="buy">Buy It Now Price</label>
        <div><input id="buy" type="text" class="tiny" placeholder="00.00" /></div>
        <div class="muted">$ (optional)</div>
      </div>

      <div class="row">
        <label>Duration</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="d" type="text" class="tiny" value="0" /> <span class="muted">Day</span>
          <input id="h" type="text" class="tiny" value="7" /> <span class="muted">Hour</span>
          <input id="m" type="text" class="tiny" value="0" /> <span class="muted">Min</span>
        </div>
        <div></div>
      </div>

      <div class="actions">
        <button class="primary" id="btnList">Listing</button>
        <button class="btn" id="btnReset" type="button">Reset</button>
      </div>

      <div id="msg"></div>
    </div>
  </div>
</div>

<!-- Your existing JS; cache-busted -->
<script src="listing.js?v=20251022"></script>
</body>
</html>
